version: "3.8"

services:
  backend:
    image: eugenekallis/servertoolpython-backend:latest
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - REDIS_URL=${REDIS_URL}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-*}
      - MAGNET_BRIDGE_URL=${MAGNET_BRIDGE_URL}
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - TZ=America/New_York
    ports:
      - "8090:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    image: eugenekallis/servertoolpython-frontend:latest
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=/api
    ports:
      - "3010:3000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  agent:
    image: eugenekallis/servertoolpython-agent:latest
    restart: unless-stopped
    environment:
      - REDIS_URL=${REDIS_URL}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  magnet_bridge:
    image: eugenekallis/servertoolpython-magnet-bridge:latest
    restart: unless-stopped
    volumes:
      - /mnt:/mnt:rshared
    environment:
      - DECYPHARR_URL=${DECYPHARR_URL:-http://192.168.1.99:8282}
      - TORRENT_DEST_DIR=/mnt/debrid/media
      - MAGNET_BRIDGE_PORT=8081
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
