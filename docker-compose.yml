version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    volumes:
      - ./backend:/app
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - TZ=America/New_York
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - WATCHPACK_POLLING=true
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile.dev
    volumes:
      - ./agent:/app
      # - /mnt:/mnt:rshared
      # Docker socket allows macros to run docker commands — remove if not needed
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - REDIS_URL=${REDIS_URL}
    # depends_on:
    #   - redis
  magnet_bridge:
    build:
      context: ./magnet_bridge
      dockerfile: Dockerfile.dev
    volumes:
      - ./magnet_bridge:/app
    environment:
      - DECYPHARR_URL=${DECYPHARR_URL:-http://192.168.1.99:8282}
      - TORRENT_DEST_DIR=/mnt/debrid/media
      - MAGNET_BRIDGE_PORT=8081
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

