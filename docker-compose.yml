version: "3.8"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - OLLAMA_HOST=${OLLAMA_HOST}
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - TZ=America/New_York
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - WATCHPACK_POLLING=true
    depends_on:
      - backend

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile.dev
    volumes:
      - ./agent:/app
      # - /mnt:/mnt:rshared
      # Docker socket allows macros to run docker commands — remove if not needed
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - REDIS_URL=${REDIS_URL}
    depends_on:
      - redis

  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile.dev
    volumes:
      - ./scraper:/app
    environment:
      - REDIS_URL=${REDIS_URL}
    depends_on:
      - redis

  arr_searcher:
    build:
      context: ./arr_searcher
      dockerfile: Dockerfile.dev
    volumes:
      - ./arr_searcher:/app
    environment:
      - REDIS_URL=${REDIS_URL}
    depends_on:
      - redis

  magnet_bridge:
    build:
      context: ./magnet_bridge
      dockerfile: Dockerfile.dev
    volumes:
      - ./magnet_bridge:/app
      # - /mnt:/mnt:rshared
    environment:
      - DECYPHARR_URL=${DECYPHARR_URL:-http://192.168.1.99:8282}
      - TORRENT_DEST_DIR=${TORRENT_DEST_DIR:-/mnt/debrid/media}
      - MAGNET_BRIDGE_PORT=8081
    ports:
      - "8081:8081"

volumes:
  postgres_data:
  frontend_node_modules:
