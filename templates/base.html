<!doctype html>
<html lang="en">
  <head>
    <title>ServerTool</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <script type="module">
      import "https://esm.sh/@material/web/all.js?bundle";
    </script>
    <style>
      :root {
        --md-sys-color-primary: #818cf8;
        --md-sys-color-surface: #020617;
        --md-sys-color-on-surface: #e2e8f0;
      }

      body {
        font-family: "Roboto", sans-serif;
        background-color: var(--md-sys-color-surface);
        color: var(--md-sys-color-on-surface);
      }
    </style>
  </head>

  <body class="h-dvh w-full overflow-hidden flex flex-row">
    <!-- Sidebar -->
    <aside class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col shadow-lg z-10 text-slate-200">
      <div class="h-16 flex items-center px-4 border-b border-slate-800">
        <a class="text-xl font-bold text-indigo-400" href="/">ServerTool</a>
      </div>
      <nav class="flex-1 overflow-y-auto py-2">
        <md-list>
          <div class="px-4 py-2 text-xs font-semibold text-slate-500 uppercase tracking-wider">Macros</div>
          {% for group in groups %} {% if group.name %}
          <div class="px-4 py-2 text-[10px] text-slate-600 uppercase">{{ group.name }}</div>
          {% endif %} {% for macro in group.macros %}
          <md-list-item type="button" hx-get="/run/{{ macro.id }}" hx-swap="none">
            <div slot="headline">{{ macro.name }}</div>
            <md-icon slot="start">terminal</md-icon>
          </md-list-item>
          {% endfor %} {% endfor %}
        </md-list>
      </nav>
      <div class="p-4 border-t border-slate-800 text-xs text-slate-400 flex items-center justify-between">
        <div>
          RD Days:
          <span class="{{ 'text-green-500' if rd_days > 30 else 'text-yellow-500' if rd_days >= 10 else 'text-red-400' }}">{{ rd_days }}</span>
        </div>
        <div class="text-[10px] opacity-50">{{ version }}</div>
      </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 flex flex-col min-h-0 bg-slate-950 p-4 md:p-6">{% block content %}{% endblock %}</main>

    <script>
      const protocol = window.location.protocol === "https:" ? "wss" : "ws";
      const socketUrl = `${protocol}://${window.location.host}/ws`;
      let socket;
      let isScrolledToBottom = true;

      function connect() {
        socket = new WebSocket(socketUrl);
        socket.onopen = () => document.getElementById("textbox")?.classList.add("border-green-500/50");
        socket.onmessage = (e) => {
          const b = document.getElementById("textbox");
          if (b) {
            b.innerText += e.data;
            if (isScrolledToBottom) b.scrollTop = b.scrollHeight;
          }
        };
        socket.onclose = () => {
          document.getElementById("textbox")?.classList.replace("border-green-500/50", "border-red-500/50");
          setTimeout(connect, 2000);
        };
      }
      connect();

      document.addEventListener("DOMContentLoaded", () => {
        const b = document.getElementById("textbox");
        if (b) b.onscroll = () => (isScrolledToBottom = b.scrollTop + b.clientHeight >= b.scrollHeight - 10);
      });
    </script>
  </body>
</html>
