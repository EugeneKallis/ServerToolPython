kind: pipeline
type: docker
name: deploy-servertool

labels:
  type: builder
  
  
steps:
  # 1. Build and push Backend
  - name: publish-backend
    image: plugins/docker
    settings:
      repo: eugenekallis/servertoolpython-backend
      tags: latest
      dockerfile: backend/Dockerfile
      context: backend
      password:
        from_secret: docker_password
    when:
      path: ["backend/**"]

  # 2. Build and push Frontend
  - name: publish-frontend
    image: plugins/docker
    settings:
      repo: eugenekallis/servertoolpython-frontend
      tags: latest
      dockerfile: frontend/Dockerfile
      context: frontend
      password:
        from_secret: docker_password
    when:
      path: ["frontend/**"]

  # 3. Build and push Agent
  - name: publish-agent
    image: plugins/docker
    settings:
      repo: eugenekallis/servertoolpython-agent
      tags: latest
      dockerfile: agent/Dockerfile
      context: agent
      password:
        from_secret: docker_password
    when:
      path: ["agent/**"]

  # 4. Deploy using Helm to 192.168.1.201
  - name: deploy-helm
    image: pelotech/drone-helm3
    settings:
      api_server:
        from_secret: k8s_server
      kubernetes_token:
        from_secret: k8s_token
      skip_tls_verify: true
      insecure: true
      debug: true
      chart: ./charts/servertool
      release: prod-servertool
      
trigger:
  branch:
    - main
  event:
    - push
