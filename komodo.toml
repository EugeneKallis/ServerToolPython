# komodo.toml v2 — auto sync, build, deploy on push
# --- RESOURCE SYNCS (GitOps Self-Management) ---
[[resource_sync]]
name = "servertoolpython-sync-dev"
[resource_sync.config]
repo = "EugeneKallis/ServerToolPython"
branch = "develop"
file_paths = ["komodo.toml"]
auto_sync = true

[[resource_sync]]
name = "servertoolpython-sync-prod"
[resource_sync.config]
repo = "EugeneKallis/ServerToolPython"
branch = "main"
file_paths = ["komodo.toml"]
auto_sync = true

# --- BACKEND ---
[[build]]
name = "servertoolpython-backend-dev"
[build.config]
builder = "docker-builder"
repo = "EugeneKallis/ServerToolPython"
branch = "develop"
build_path = "backend"
dockerfile_path = "Dockerfile"
image_name = "servertoolpython-backend"
image_tag = "dev"
include_latest_tag = false
image_registry = [
  { domain = "docker.io", account = "eugenekallis" }
]

[[build]]
name = "servertoolpython-backend-prod"
[build.config]
builder = "docker-builder"
repo = "EugeneKallis/ServerToolPython"
branch = "main"
build_path = "backend"
dockerfile_path = "Dockerfile"
image_name = "servertoolpython-backend"
image_registry = [
  { domain = "docker.io", account = "eugenekallis" }
]

# --- FRONTEND ---
[[build]]
name = "servertoolpython-frontend-dev"
[build.config]
builder = "docker-builder"
repo = "EugeneKallis/ServerToolPython"
branch = "develop"
build_path = "frontend"
dockerfile_path = "Dockerfile"
image_name = "servertoolpython-frontend"
image_tag = "dev"
include_latest_tag = false
image_registry = [
  { domain = "docker.io", account = "eugenekallis" }
]

[[build]]
name = "servertoolpython-frontend-prod"
[build.config]
builder = "docker-builder"
repo = "EugeneKallis/ServerToolPython"
branch = "main"
build_path = "frontend"
dockerfile_path = "Dockerfile"
image_name = "servertoolpython-frontend"
image_registry = [
  { domain = "docker.io", account = "eugenekallis" }
]

# --- AGENT ---
[[build]]
name = "servertoolpython-agent-dev"
[build.config]
builder = "docker-builder"
repo = "EugeneKallis/ServerToolPython"
branch = "develop"
build_path = "agent"
dockerfile_path = "Dockerfile"
image_name = "servertoolpython-agent"
image_tag = "dev"
include_latest_tag = false
image_registry = [
  { domain = "docker.io", account = "eugenekallis" }
]

[[build]]
name = "servertoolpython-agent-prod"
[build.config]
builder = "docker-builder"
repo = "EugeneKallis/ServerToolPython"
branch = "main"
build_path = "agent"
dockerfile_path = "Dockerfile"
image_name = "servertoolpython-agent"
image_registry = [
  { domain = "docker.io", account = "eugenekallis" }
]

# --- STACKS ---
[[stack]]
name = "servertoolpython-dev"
builds = [
  "servertoolpython-backend-dev",
  "servertoolpython-frontend-dev",
  "servertoolpython-agent-dev"
]
[stack.config]
server = "lxc-docker"
repo = "EugeneKallis/ServerToolPython"
branch = "develop"
file_paths = ["docker-compose.dev.yml"]
auto_update = true

[stack.config.env]
POSTGRES_USER = "postgres"
POSTGRES_DB = "servertool_dev"
POSTGRES_PASSWORD = "[[POSTGRES_PASSWORD]]"
POSTGRES_HOST = "[[POSTGRES_HOST]]"
REDIS_URL = "[[REDIS_URL]]"
CORS_ALLOWED_ORIGINS = "*"

[[stack]]
name = "servertoolpython-prod"
builds = [
  "servertoolpython-backend-prod",
  "servertoolpython-frontend-prod",
  "servertoolpython-agent-prod"
]
[stack.config]
server = "lxc-docker"
repo = "EugeneKallis/ServerToolPython"
branch = "main"
file_paths = ["docker-compose.prod.yml"]
auto_update = true

[stack.config.env]
POSTGRES_USER = "postgres"
POSTGRES_DB = "servertool_prod"
POSTGRES_PASSWORD = "[[POSTGRES_PASSWORD]]"
POSTGRES_HOST = "[[POSTGRES_HOST]]"
REDIS_URL = "[[REDIS_URL]]"
CORS_ALLOWED_ORIGINS = "*"

# --- PROCEDURES (Combined Triggers) ---
[[procedure]]
name = "trigger-dev-builds"
[procedure.config]
webhook_enabled = true

# Stage 1: sync komodo resources from git
[[procedure.config.stage]]
name = "Sync Dev Config"
executions = [
    { execution.type = "RunSync", execution.params.sync = "servertoolpython-sync-dev" }
]

# Stage 2: build all dev images in parallel
[[procedure.config.stage]]
name = "Build All Dev"
executions = [
    { execution.type = "RunBuild", execution.params.build = "servertoolpython-backend-dev" },
    { execution.type = "RunBuild", execution.params.build = "servertoolpython-frontend-dev" },
    { execution.type = "RunBuild", execution.params.build = "servertoolpython-agent-dev" }
]

# Stage 3: deploy the dev stack with the new images
[[procedure.config.stage]]
name = "Deploy Dev Stack"
executions = [
    { execution.type = "DeployStack", execution.params.stack = "servertoolpython-dev" }
]

[[procedure]]
name = "trigger-prod-builds"
[procedure.config]
webhook_enabled = true

# Stage 1: sync komodo resources from git
[[procedure.config.stage]]
name = "Sync Prod Config"
executions = [
    { execution.type = "RunSync", execution.params.sync = "servertoolpython-sync-prod" }
]

# Stage 2: build all prod images in parallel
[[procedure.config.stage]]
name = "Build All Prod"
executions = [
    { execution.type = "RunBuild", execution.params.build = "servertoolpython-backend-prod" },
    { execution.type = "RunBuild", execution.params.build = "servertoolpython-frontend-prod" },
    { execution.type = "RunBuild", execution.params.build = "servertoolpython-agent-prod" }
]

# Stage 3: deploy the prod stack with the new images
[[procedure.config.stage]]
name = "Deploy Prod Stack"
executions = [
    { execution.type = "DeployStack", execution.params.stack = "servertoolpython-prod" }
]
