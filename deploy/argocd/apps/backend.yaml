apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: servertool-backend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:EugeneKallis/ServerToolPython.git
    targetRevision: HEAD
    path: deploy/charts/backend
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
