kind: pipeline
type: docker
name: dev-deploy

labels:
  type: builder

steps:
  - name: generate-tag
    image: alpine:latest
    when:
      branch: develop
      event: [ push, manual ]
    commands:
      - echo "dev-$(date +'%m.%d.%H-%M').${CI_COMMIT_SHA:0:8}" > .tags

  - name: build-frontend
    image: plugins/docker
    when:
      branch: develop
      event: [ push, manual ]
    settings:
      repo: eugenekallis/servertoolpython-frontend
      dockerfile: frontend/Dockerfile
      context: frontend
      daemon_off: true
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password

  - name: build-backend
    image: plugins/docker
    when:
      branch: develop
      event: [ push, manual ]
    settings:
      repo: eugenekallis/servertoolpython-backend
      dockerfile: backend/Dockerfile
      context: backend
      daemon_off: true
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password

  - name: build-agent
    image: plugins/docker
    when:
      branch: develop
      event: [ push, manual ]
    settings:
      repo: eugenekallis/servertoolpython-agent
      dockerfile: agent/Dockerfile
      context: agent
      daemon_off: true
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password

  - name: build-scraper
    image: plugins/docker
    when:
      branch: develop
      event: [ push, manual ]
    settings:
      repo: eugenekallis/servertoolpython-scraper
      dockerfile: scraper/Dockerfile
      context: scraper
      daemon_off: true
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password

  - name: build-arr-searcher
    image: plugins/docker
    when:
      branch: develop
      event: [ push, manual ]
    settings:
      repo: eugenekallis/servertoolpython-arr-searcher
      dockerfile: arr_searcher/Dockerfile
      context: arr_searcher
      daemon_off: true
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password

  - name: build-magnet-bridge
    image: plugins/docker
    when:
      branch: develop
      event: [ push, manual ]
    settings:
      repo: eugenekallis/servertoolpython-magnet-bridge
      dockerfile: magnet_bridge/Dockerfile
      context: magnet_bridge
      daemon_off: true
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password

  - name: deploy-dev
    image: alpine:latest
    when:
      branch: develop
      event: [ push, manual ]
    commands:
      - apk add --no-cache git yq openssh-client
      - mkdir -p ~/.ssh
      - echo "$GIT_SSH_KEY" > ~/.ssh/id_rsa
      - chmod 600 ~/.ssh/id_rsa
      - ssh-keyscan github.com >> ~/.ssh/known_hosts
      - git clone git@github.com:EugeneKallis/kubernetes-cluster.git infra
      - cd infra
      - 'export TAG=$(cat ../.tags)'
      - 'yq -i ".global.image.tag = \"$TAG\"" charts/servertool-python/values-dev.yaml'
      - git add .
      - git config user.name "Woodpecker CI"
      - git config user.email "woodpecker@cluster.lan"
      - 'git commit -m "chore: deploy dev $TAG"'
      - git push origin main
    environment:
      GIT_SSH_KEY:
        from_secret: git_ssh_key
    depends_on:
      - build-frontend
      - build-backend
      - build-agent
      - build-scraper
      - build-arr-searcher
      - build-magnet-bridge
