kind: pipeline
type: docker
name: prod-deploy

labels:
  type: builder

steps:
  - name: generate-tag
    image: alpine:latest
    when:
      branch: main
      event: [ push, manual ]
    commands:
      - echo "$(date +'%m.%d.%H-%M').${CI_COMMIT_SHA:0:8}" > .tags

  # 1. Build and push Backend
  - name: publish-backend
    image: plugins/docker
    when:
      branch: main
      event: [ push, manual ]
    settings:
      repo: eugenekallis/servertoolpython-backend
      dockerfile: backend/Dockerfile
      context: backend
      daemon_off: true
      tags_file: .tags
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    depends_on: [generate-tag]

  # 2. Build and push Frontend
  - name: publish-frontend
    image: plugins/docker
    when:
      branch: main
      event: [ push, manual ]
    settings:
      repo: eugenekallis/servertoolpython-frontend
      dockerfile: frontend/Dockerfile
      context: frontend
      daemon_off: true
      tags_file: .tags
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    depends_on: [generate-tag]

  # 3. Build and push Agent
  - name: publish-agent
    image: plugins/docker
    when:
      branch: main
      event: [ push, manual ]
    settings:
      repo: eugenekallis/servertoolpython-agent
      dockerfile: agent/Dockerfile
      context: agent
      daemon_off: true
      tags_file: .tags
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    depends_on: [generate-tag]

  # 4. Build and push Scraper
  - name: publish-scraper
    image: plugins/docker
    when:
      branch: main
      event: [ push, manual ]
    settings:
      repo: eugenekallis/servertoolpython-scraper
      dockerfile: scraper/Dockerfile
      context: scraper
      daemon_off: true
      tags_file: .tags
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    depends_on: [generate-tag]

  # 5. Build and push Arr Searcher
  - name: publish-arr-searcher
    image: plugins/docker
    when:
      branch: main
      event: [ push, manual ]
    settings:
      repo: eugenekallis/servertoolpython-arr-searcher
      dockerfile: arr_searcher/Dockerfile
      context: arr_searcher
      daemon_off: true
      tags_file: .tags
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    depends_on: [generate-tag]

  # 6. Build and push Magnet Bridge
  - name: publish-magnet-bridge
    image: plugins/docker
    when:
      branch: main
      event: [ push, manual ]
    settings:
      repo: eugenekallis/servertoolpython-magnet-bridge
      dockerfile: magnet_bridge/Dockerfile
      context: magnet_bridge
      daemon_off: true
      tags_file: .tags
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    depends_on: [generate-tag]

  # 7. Deploy to Production
  - name: deploy-prod
    image: alpine:latest
    when:
      branch: main
      event: [ push, manual ]
    commands:
      - apk add --no-cache git yq openssh-client
      - mkdir -p ~/.ssh
      - echo "$GIT_SSH_KEY" > ~/.ssh/id_rsa
      - chmod 600 ~/.ssh/id_rsa
      - ssh-keyscan github.com >> ~/.ssh/known_hosts
      - git clone git@github.com:EugeneKallis/kubernetes-cluster.git infra
      - cd infra
      - 'export TAG=$(cat ../.tags)'
      - 'yq -i ".global.image.tag = \"$TAG\"" charts/servertool-python/values-prod.yaml'
      - git add .
      - git config user.name "Woodpecker CI"
      - git config user.email "woodpecker@cluster.lan"
      - 'git commit -m "chore: deploy prod $TAG"'
      - git push origin main
    environment:
      GIT_SSH_KEY:
        from_secret: git_ssh_key
    depends_on:
      - publish-backend
      - publish-frontend
      - publish-agent
      - publish-scraper
      - publish-arr-searcher
      - publish-magnet-bridge
